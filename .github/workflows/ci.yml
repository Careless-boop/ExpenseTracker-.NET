name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ExpenseTracker.slnx

      - name: Build
        run: dotnet build ExpenseTracker.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ExpenseTracker.slnx --no-build --configuration Release --verbosity normal
